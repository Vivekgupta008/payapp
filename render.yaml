services:
  - type: web
    name: offlinepay-api
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ED25519_PRIVATE_KEY_B64
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: offlinepay-db
          property: connectionString

databases:
  - name: offlinepay-db
    plan: free
    region: singapore
